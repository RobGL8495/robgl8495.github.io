<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
color:#333;
}

header{
background:#1f3a5f;
color:white;
text-align:center;
padding:50px 20px;
}

header h1{
margin:0;
font-size:42px;
}

header p{
font-size:18px;
margin-top:10px;
}

.whatsapp{
display:inline-block;
margin-top:25px;
background:#25D366;
color:white;
padding:18px 30px;
text-decoration:none;
font-weight:bold;
border-radius:8px;
font-size:18px;
}

section{
padding:50px 20px;
max-width:1000px;
margin:auto;
}

h2{
color:#1f3a5f;
margin-bottom:20px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.service{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
border-radius:10px;
}

footer{
background:#1f3a5f;
color:white;
text-align:center;
padding:30px;
}
</style>
